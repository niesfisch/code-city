name: build

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Run tests and build the executable jar
        run: ./gradlew clean test backend:bootJar

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: code-city-jar
          path: backend/build/libs/code-city.jar

  package-native:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build platform runtime image
        run: ./gradlew backend:jpackageImage
        shell: bash

      - name: Upload runtime image
        uses: actions/upload-artifact@v4
        with:
          name: code-city-${{ matrix.os }}
          path: backend/build/jpackage/*

